<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing UI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');

        * {
            margin: 0;
            padding: 0;
            font-family: "Outfit", sans-serif;
            color: rgb(255, 255, 255);
        }

        main {
            height: 100vh;
            width: 100vw;
            background-image: url(bg.jpg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            position: fixed;
            background-color: rgb(245, 228, 228);
        }

        .headd {
            justify-self: center;
            margin: 60px;
            font-size: 40px;
            font-weight: 500;
        }

        .pannel {
            height: 66vh;
            width: 90vw;
            background-color: rgb(101 75 58 / 12%);
            position: relative;
            margin-left: 62px;
            border-radius: 20px;
            backdrop-filter: blur(9px);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            column-rule: 2px solid #1a0f0b36;
        }

        .plan {
            margin: 50px 40px;
            padding: 3px;
        }

        .name {
            font-size: 24px;
            font-weight: 500;
        }

        p {
            font-size: 13px;
        }

        .free {
            margin: 56px 40px;
        }

        .price {
            font-size: 60px;
            font-weight: 500;
        }

        .pr {
            display: flex;
            margin: 50px 40px;
        }

        .dollar {
            margin-top: 13px;
            font-weight: 700;
        }

        .month {
            margin-top: 50px;
        }


        .seprator {
            height: 1.2px;
            width: 23vw;
            justify-self: center;
            background-color: #6e543b;
        }

        .detail {
            margin: 20px 40px;
        }

        button {
            background-color: #7e604887;
            border-style: none;
            border-radius: 20px;
            height: 40px;
            width: 250px;
            font-size: 13px;
        }

        .btn {
            justify-self: center;
        }

        button:hover {
            background-color: #1a0f0b;
        }
    </style>
</head>

<body>
    <main>

        <header>
            <div class="headd"><b>Glassmorphism</b> Pricing Plan UI</div>
        </header>

        <body>
            <div class="pannel">
                <div>
                    <div class="plan">
                        <h3 class="name">Basic Plan</h3>
                        <p>Membership</p>
                    </div>
                    <h1 class="price free">FREE</h1>
                    <div class="seprator"></div>
                    <div class="detail">
                        <p>&bull; Community Access</p>
                    </div>
                    <div class="btn">
                        <button>Sign up</button>
                    </div>
                </div>
                <div>
                    <div class="plan">
                        <h3 class="name">Standard Plan</h3>
                        <p>Membership</p>
                    </div>
                    <div class="pr">
                        <p class="dollar">&dollar;</p>
                        <h1 class="price">10</h1>
                        <p class="month">/month</p>
                    </div>
                    <div class="seprator"></div>
                    <div class="detail">
                        <p>&bull; Core Platform Features</p>
                        <p>&bull; Email Support</p>
                    </div>
                    <div class="btn">
                        <button>Sign up</button>
                    </div>
                </div>
                <div>
                    <div class="plan">
                        <h3 class="name">Pro Plan</h3>
                        <p>Membership</p>
                    </div>
                    <div class="pr">
                        <p class="dollar">&dollar;</p>
                        <h1 class="price">30</h1>
                        <p class="month">/month</p>
                    </div>
                    <div class="seprator"></div>
                    <div class="detail">
                        <p>&bull; Advanced Features</p>
                        <p>&bull; Priority Support</p>
                    </div>
                    <div class="btn">
                        <button>Sign up</button>
                    </div>
                </div>
            </div>
        </body>
    </main>
</body>

</html>
